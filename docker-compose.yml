services:
  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-c", "/etc/nats/nats.conf"]
    volumes:
      - ./config/nats.conf:/etc/nats/nats.conf:ro

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_PROMETHEUS_AUTH_TYPE: public
    command: server /data --console-address ":9001"
    volumes:
      - ./data/minio:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb local/ekv --ignore-existing;
      "

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - "4317:4317"
      - "8889:8889"
    volumes:
      - ./config/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    entrypoint: >
      /bin/sh -c "
      mkdir -p /tmp/dashboards &&
      wget -qO /tmp/dashboards/minio.json 'https://grafana.com/api/dashboards/13502/revisions/latest/download' &&
      sed -i 's/$${DS_PROMETHEUS}/grafana/g' /tmp/dashboards/minio.json;
      exec /run.sh
      "
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards/local:ro
    depends_on:
      - prometheus

  ekv-node-1:
    build:
      context: .
      dockerfile: Pulsy.EKV.Node/Dockerfile
    hostname: ekv-node-1
    environment:
      Kestrel__Endpoints__Grpc__Url: http://0.0.0.0:8080
      Node__Id: ekv-node-1
      Node__DataPath: /data
      Node__GrpcEndpoint: http://ekv-node-1:8080
      Cluster__ClusterMode: "true"
      Nats__Url: nats://nats:4222
      Backends__s3__Endpoint: http://minio:9000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "8081:8080"
    volumes:
      - ekv-data-1:/data
    depends_on:
      - nats
      - minio
      - otel-collector

  ekv-node-2:
    build:
      context: .
      dockerfile: Pulsy.EKV.Node/Dockerfile
    hostname: ekv-node-2
    environment:
      Kestrel__Endpoints__Grpc__Url: http://0.0.0.0:8080
      Node__Id: ekv-node-2
      Node__DataPath: /data
      Node__GrpcEndpoint: http://ekv-node-2:8080
      Cluster__ClusterMode: "true"
      Nats__Url: nats://nats:4222
      Backends__s3__Endpoint: http://minio:9000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "8082:8080"
    volumes:
      - ekv-data-2:/data
    depends_on:
      - nats
      - minio
      - otel-collector

volumes:
  ekv-data-1:
  ekv-data-2:
